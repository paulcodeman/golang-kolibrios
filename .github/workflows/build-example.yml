name: Build Examples

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-examples:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install toolchain
        run: bash ./scripts/install-ubuntu-toolchain.sh

      - name: Check runtime probes and behavior
        run: make check-runtime

      - name: Check app template
        run: make check-app-template

      - name: Build example matrix
        run: make rebuild-all

      - name: Check emulator smoke path
        run: make check-emulator-smoke

      - name: Check diagnostics utility path
        run: make check-diagnostics

      - name: Verify build outputs
        run: |
          test -f apps/diag/diag.kex
          test -f examples/window/window.kex
          test -f examples/runtime/runtime.kex
          test -f examples/time/time.kex
          test -f examples/system/system.kex
          test -f examples/input/input.kex
          test -f examples/ipc/ipc.kex
          test -f examples/files/files.kex
          test -f examples/path/path.kex
          test -f examples/filepath/filepath.kex
          test -f examples/strings/strings.kex
          test -f examples/bytes/bytes.kex
          test -f examples/io/io.kex
          test -f examples/os/os.kex
          test -f examples/fmt/fmt.kex
          test -f examples/bufio/bufio.kex
          test -f examples/strconv/strconv.kex
          test -f examples/console/console.kex
          test -f tests/smokeapp/smokeapp.kex

      - name: Upload example artifacts
        uses: actions/upload-artifact@v4
        with:
          name: example-kex
          path: |
            apps/diag/diag.kex
            examples/window/window.kex
            examples/runtime/runtime.kex
            examples/time/time.kex
            examples/system/system.kex
            examples/input/input.kex
            examples/ipc/ipc.kex
            examples/files/files.kex
            examples/path/path.kex
            examples/filepath/filepath.kex
            examples/strings/strings.kex
            examples/bytes/bytes.kex
            examples/io/io.kex
            examples/os/os.kex
            examples/fmt/fmt.kex
            examples/bufio/bufio.kex
            examples/strconv/strconv.kex
            examples/console/console.kex
            tests/smokeapp/smokeapp.kex
