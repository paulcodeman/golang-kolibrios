name: Build Examples

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-examples:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install toolchain
        run: bash ./scripts/install-ubuntu-toolchain.sh

      - name: Check runtime probes and behavior
        run: make check-runtime

      - name: Check app template
        run: make check-app-template

      - name: Build example matrix
        run: make rebuild-all

      - name: Check emulator smoke path
        run: make check-emulator-smoke

      - name: Verify build outputs
        run: |
          test -f examples/window/window.kex
          test -f examples/runtime/runtime.kex
          test -f examples/time/time.kex
          test -f examples/system/system.kex
          test -f examples/input/input.kex
          test -f examples/ipc/ipc.kex
          test -f tests/smokeapp/smokeapp.kex

      - name: Upload example artifacts
        uses: actions/upload-artifact@v4
        with:
          name: example-kex
          path: |
            examples/window/window.kex
            examples/runtime/runtime.kex
            examples/time/time.kex
            examples/system/system.kex
            examples/input/input.kex
            examples/ipc/ipc.kex
            tests/smokeapp/smokeapp.kex
