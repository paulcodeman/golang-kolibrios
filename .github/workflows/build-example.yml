name: Build Samples

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-samples:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install toolchain
        run: bash ./scripts/install-ubuntu-toolchain.sh

      - name: Build sample matrix
        run: make rebuild-all

      - name: Verify build outputs
        run: |
          test -f cmd/example/example.kex
          test -f cmd/hello/hello.kex
          test -f cmd/strings/strings.kex

      - name: Upload sample artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sample-kex
          path: |
            cmd/example/example.kex
            cmd/hello/hello.kex
            cmd/strings/strings.kex
