name: Build Samples

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-samples:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install toolchain
        run: bash ./scripts/install-ubuntu-toolchain.sh

      - name: Check runtime probes and behavior
        run: make check-runtime

      - name: Build sample matrix
        run: make rebuild-all

      - name: Verify build outputs
        run: |
          test -f cmd/example/example.kex
          test -f cmd/hello/hello.kex
          test -f cmd/strings/strings.kex
          test -f cmd/slices/slices.kex
          test -f cmd/interfaces/interfaces.kex
          test -f cmd/emptyiface/emptyiface.kex
          test -f cmd/assertions/assertions.kex
          test -f cmd/sysinfo/sysinfo.kex
          test -f cmd/message/message.kex
          test -f cmd/ipc/ipc.kex

      - name: Upload sample artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sample-kex
          path: |
            cmd/example/example.kex
            cmd/hello/hello.kex
            cmd/strings/strings.kex
            cmd/slices/slices.kex
            cmd/interfaces/interfaces.kex
            cmd/emptyiface/emptyiface.kex
            cmd/assertions/assertions.kex
            cmd/sysinfo/sysinfo.kex
            cmd/message/message.kex
            cmd/ipc/ipc.kex
